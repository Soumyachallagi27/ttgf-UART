---
project:
  title: "UART"
  author: "Soumya Challagi"
  discord: ""
  description: "8-bit UART transmitter and receiver for TinyTapeout"
  language: "Verilog"
  clock_hz: 0
  tiles: "1x1"
  top_module: "tt_um_example"
  source_files:
    - "project.v"

pinout:
  ui[0]: "tx_data[0]"
  ui[1]: "tx_data[1]"
  ui[2]: "tx_data[2]"
  ui[3]: "tx_data[3]"
  ui[4]: "tx_data[4]"
  ui[5]: "tx_data[5]"
  ui[6]: "tx_data[6]"
  ui[7]: "tx_data[7]"

  uo[0]: "rx_data[0]"
  uo[1]: "rx_data[1]"
  uo[2]: "rx_data[2]"
  uo[3]: "rx_data[3]"
  uo[4]: "rx_data[4]"
  uo[5]: "rx_data[5]"
  uo[6]: "rx_data[6]"
  uo[7]: "rx_data[7]"

  uio[0]: "uart_rx input"
  uio[1]: "tx_start input"
  uio[2]: "uart_tx output"
  uio[3]: "tx_busy output"
  uio[4]: "tx_done output"
  uio[5]: "rx_valid output"
  uio[6]: "rx_busy output"
  uio[7]: "frame_error output"
